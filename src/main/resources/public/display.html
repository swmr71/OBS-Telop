<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OBS 表示画面</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #player { width: 100%; height: 100%; border: none; z-index: 1; }

        /* 【追加】テロップの最小限のスタイル設定 */
        #telop-container {
            position: absolute;
            bottom: 50px;           /* 画面下部から50px上に配置 */
            left: 5%;
            width: 90%;
            background: rgba(0, 0, 0, 0.8); /* 黒背景（透過80%） */
            color: white;           /* 白文字 */
            font-family: sans-serif;
            font-size: 32px;        /* 大きめの文字サイズ */
            font-weight: bold;
            text-align: center;
            padding: 15px 0;
            border-radius: 8px;
            z-index: 999;           /* YouTubeプレイヤーより手前に表示 */
            display: none;          /* 初期状態は非表示 */
        }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div id="telop-container"></div>

<div id="player"></div>

<script>
    const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
    const ws = new WebSocket(wsProtocol + window.location.host + "/ws");
    
    let player = null;
    let pendingVideoId = null;
    const telopContainer = document.getElementById("telop-container");

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%', width: '100%',
            playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'cc_load_policy': 0, 'iv_load_policy': 3 },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange
            }
        });
    }
    function onPlayerReady(event) {
        event.target.unloadModule("captions");
        if (pendingVideoId) { loadNewVideo(pendingVideoId); pendingVideoId = null; }
    }
    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.PLAYING) {
            event.target.unloadModule("captions");
        }
    }
    function loadNewVideo(videoId) {
        if (player && typeof player.loadVideoById === 'function') {
            player.loadVideoById({ videoId: videoId, playerVars: { 'cc_load_policy': 0 } });
        } else { pendingVideoId = videoId; }
    }

    // WebSocketのメッセージ受信処理
    ws.onmessage = (event) => {
        try {
            const res = JSON.parse(event.data);
            
            // YouTubeの処理
            if (res.type === "youtube") {
                loadNewVideo(res.data);
            }
            
            // 【追加】テロップの処理
            if (res.type === "telop") {
                if (res.action === "show") {
                    // 文字を設定して画面に出す
                    telopContainer.innerText = res.data;
                    telopContainer.style.display = "block";
                } else if (res.action === "hide") {
                    // 画面から消す
                    telopContainer.style.display = "none";
                }
            }

        } catch (e) {
            console.error("パースエラー:", e);
        }
    };

    ws.onclose = () => { setTimeout(() => { window.location.reload(); }, 5000); };
</script>
</body>
</html>
