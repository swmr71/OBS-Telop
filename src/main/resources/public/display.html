<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>OBS 表示画面</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        #player { width: 100%; height: 100%; border: none; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

<div id="player"></div>

<script>
    const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
    const ws = new WebSocket(wsProtocol + window.location.host + "/ws");
    
    let player = null;
    let pendingVideoId = null;

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            playerVars: {
                'autoplay': 1,
                'controls': 0,
                'rel': 0,
                'cc_load_policy': 0, // デフォルトオフ（効かない動画用に対策を追加）
                'iv_load_policy': 3
            },
            events: {
                'onReady': onPlayerReady,
                'onStateChange': onPlayerStateChange // ★動画の状態変化を監視するイベントを追加
            }
        });
    }

    function onPlayerReady(event) {
        event.target.unloadModule("captions");
        if (pendingVideoId) {
            loadNewVideo(pendingVideoId);
            pendingVideoId = null;
        }
    }

    // ★動画の状態が変わったときに呼ばれる関数
    function onPlayerStateChange(event) {
        // YT.PlayerState.PLAYING (値は 1) ＝ 動画の再生が実際に始まったとき
        if (event.data === YT.PlayerState.PLAYING) {
            // 再生が始まった瞬間に、字幕モジュールを強制的にアンロードする
            event.target.unloadModule("captions");
            console.log("動画再生を検知：字幕をオフにしました");
        }
    }

    function loadNewVideo(videoId) {
        if (player && typeof player.loadVideoById === 'function') {
            // 動画切り替え時にも初期設定を引き継ぐ
            player.loadVideoById({ 
                videoId: videoId,
                playerVars: { 'cc_load_policy': 0 }
            });
        } else {
            pendingVideoId = videoId;
        }
    }

    ws.onmessage = (event) => {
        try {
            const res = JSON.parse(event.data);
            if (res.type === "youtube") {
                loadNewVideo(res.data);
            }
        } catch (e) {
            console.error("パースエラー:", e);
        }
    };

    ws.onclose = () => {
        setTimeout(() => { window.location.reload(); }, 5000);
    };
</script>
</body>
</html>
